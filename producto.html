<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Producto | Chesed</title>

    <link
        rel="stylesheet"
        href="producto.css">

</head>

<body>

<header>

    <a
        href="index.html"
        class="volver">

        ← Volver

    </a>

</header>

<main id="producto">

    <section class="galeria">

        <img
            id="imagen-principal"
            src=""
            alt="Producto">

        <div
            id="miniaturas"
            class="miniaturas">

        </div>

    </section>

    <section class="info">

        <p id="categoria"></p>

        <h1 id="nombre"></h1>

        <h2 id="precio"></h2>

    

        <p id="stock"></p>

        <p id="descripcion"></p>

        <div class="cantidad">

    <button id="btn-restar">-</button>

    <span id="cantidad">0</span>

    <button id="btn-sumar">+</button>

</div>

        <button
            id="agregar-carrito">

            Agregar al carrito

        </button>

    </section>

</main>

<section class="relacionados">

    <h2>

        También te puede interesar

    </h2>

    <div id="productos-relacionados"></div>

</section>

<script
    type="module"
    src="producto.js">

</script>

</body>

</html>
